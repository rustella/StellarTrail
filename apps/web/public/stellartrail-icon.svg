<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">寻径星野产品图标</title>
  <desc id="desc">A clear night mountain trail icon with a compass star.</desc>
  <defs>
    <clipPath id="rounded-mask">
      <rect width="512" height="512" rx="96" ry="96" />
    </clipPath>
    <linearGradient id="sky-gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1731" />
      <stop offset="56%" stop-color="#102f3e" />
      <stop offset="100%" stop-color="#074148" />
    </linearGradient>
    <linearGradient id="rear-mountain" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#62c8bd" />
      <stop offset="100%" stop-color="#1f746f" />
    </linearGradient>
    <linearGradient id="front-mountain" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1b948b" />
      <stop offset="100%" stop-color="#053d42" />
    </linearGradient>
    <linearGradient id="trail-gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff3b0" />
      <stop offset="100%" stop-color="#f6c35f" />
    </linearGradient>
    <radialGradient id="star-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff7bf" stop-opacity="0.94" />
      <stop offset="42%" stop-color="#f7d35c" stop-opacity="0.52" />
      <stop offset="100%" stop-color="#f7d35c" stop-opacity="0" />
    </radialGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#031720" flood-opacity="0.32" />
    </filter>
  </defs>
  <g clip-path="url(#rounded-mask)">
    <g id="night-sky">
      <rect width="512" height="512" fill="url(#sky-gradient)" />
      <path d="M0 356 C86 300 142 314 206 270 C283 216 355 214 512 278 L512 512 L0 512 Z" fill="#082a35" opacity="0.36" />
      <circle cx="72" cy="92" r="4" fill="#a8d6ce" opacity="0.72" />
      <circle cx="158" cy="54" r="3.2" fill="#d7f4ea" opacity="0.62" />
      <circle cx="394" cy="76" r="4.5" fill="#d7f4ea" opacity="0.74" />
      <circle cx="430" cy="166" r="3" fill="#a8d6ce" opacity="0.58" />
      <circle cx="248" cy="124" r="2.6" fill="#d7f4ea" opacity="0.55" />
    </g>
    <g id="compass-star" filter="url(#soft-shadow)">
      <circle cx="302" cy="124" r="64" fill="url(#star-glow)" />
      <circle cx="302" cy="124" r="38" fill="#25364a" opacity="0.62" />
      <circle cx="302" cy="124" r="28" fill="#f2d15f" opacity="0.24" />
      <path d="M302 68 L313 113 L358 124 L313 135 L302 180 L291 135 L246 124 L291 113 Z" fill="#fff2a3" />
      <path d="M302 88 L309 117 L338 124 L309 131 L302 160 L295 131 L266 124 L295 117 Z" fill="#f7c948" />
      <path d="M269 91 L294 118 L267 145 L294 130 L321 157 L310 130 L337 103 L310 118 Z" fill="#fff9d7" opacity="0.86" />
    </g>
    <g id="mountains">
      <path d="M0 318 L88 226 L145 276 L209 174 L292 302 L366 216 L512 346 L512 512 L0 512 Z" fill="url(#rear-mountain)" />
      <path d="M88 226 L145 276 L209 174 L244 229 L204 209 L150 306 Z" fill="#a4f2de" opacity="0.82" />
      <path d="M366 216 L512 346 L512 384 L424 294 L390 318 Z" fill="#99ead9" opacity="0.74" />
      <path d="M0 386 L70 300 L126 342 L196 238 L273 342 L342 276 L512 392 L512 512 L0 512 Z" fill="url(#front-mountain)" />
      <path d="M70 300 L126 342 L196 238 L226 279 L190 265 L136 362 Z" fill="#51c9b7" />
      <path d="M342 276 L512 392 L512 432 L409 340 L378 358 Z" fill="#4fc3b0" />
      <path d="M0 424 L64 354 L132 422 L206 328 L278 414 L332 350 L512 444 L512 512 L0 512 Z" fill="#06333a" />
    </g>
    <g id="trail">
      <path d="M246 512 C239 455 238 413 265 372 C285 342 297 309 286 277" fill="none" stroke="#6e451f" stroke-width="35" stroke-linecap="round" />
      <path d="M246 512 C239 455 238 413 265 372 C285 342 297 309 286 277" fill="none" stroke="url(#trail-gradient)" stroke-width="24" stroke-linecap="round" />
      <path d="M276 278 C287 303 280 337 257 371" fill="none" stroke="#fff8c7" stroke-width="7" stroke-linecap="round" opacity="0.95" />
    </g>
    <g id="foreground-trees" fill="#031f25" opacity="0.9">
      <path d="M62 420 l-28 38 h18 l-24 34 h68 l-24 -34 h18 z" />
      <rect x="59" y="476" width="8" height="36" rx="3" />
      <path d="M450 398 l-31 42 h20 l-27 38 h76 l-27 -38 h20 z" />
      <rect x="446" y="468" width="9" height="44" rx="3" />
    </g>
  </g>
</svg>
