name: StellarTrail
options:
  minimumXcodeGenVersion: 2.42.0
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
packages: {}
targets:
  StellarTrail:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: StellarTrail
        excludes:
          - Resources/**
      - path: ../../packages/apple/StellarTrailKit/Sources/StellarTrailKit
      - path: StellarTrail/Resources/Assets.xcassets
        buildPhase: resources
      - path: StellarTrail/Resources/Localizable.strings
        buildPhase: resources
      - path: StellarTrail/Resources/ClientConfig.plist
        buildPhase: resources
        optional: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rustella.stellartrail
        INFOPLIST_FILE: StellarTrail/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_USER_SCRIPT_SANDBOXING: YES
    scheme:
      testTargets:
        - StellarTrailTests
        - StellarTrailUITests
  StellarTrailTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: StellarTrailTests
    dependencies:
      - target: StellarTrail
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rustella.stellartrail.tests
        INFOPLIST_FILE: StellarTrailTests/Info.plist
  StellarTrailUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: StellarTrailUITests
    dependencies:
      - target: StellarTrail
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rustella.stellartrail.uitests
        INFOPLIST_FILE: StellarTrailUITests/Info.plist
