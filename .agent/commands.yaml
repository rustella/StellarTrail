commands:
  cargo-fmt-check:
    cwd: .
    command: cargo fmt --all -- --check
    when_to_run: Run after changing any Rust file.
    side_effects: Checks formatting only and does not modify files.
  cargo-check:
    cwd: .
    command: cargo check --workspace
    when_to_run: Run after changing server Rust types, routes, services, repositories, migrations, or DTOs.
    side_effects: Compile check only; no business side effects.
  cargo-test:
    cwd: .
    command: cargo test --workspace
    when_to_run: Run after changing server logic, migrations, domain validation, or tests.
    side_effects: Runs tests and may create temporary test database files.
  cargo-clippy:
    cwd: .
    command: cargo clippy --workspace --all-targets -- -D warnings
    when_to_run: Run before submitting server Rust changes.
    side_effects: Static analysis only; no business side effects.
  cargo-doc:
    cwd: .
    command: cargo doc --workspace --no-deps
    when_to_run: Run after changing rustdoc comments, public types, or public functions.
    side_effects: Generates local documentation artifacts under target/doc.
  npm-check:
    cwd: .
    command: npm run check
    when_to_run: Run after changing TypeScript, web, Mini Program, or shared packages.
    side_effects: Type check only; no business side effects.
  npm-format-check:
    cwd: .
    command: npm run format:check
    when_to_run: Run after changing frontend, shared packages, Markdown, JSON, YAML, or other formatted files.
    side_effects: Checks formatting only and does not modify files.
  git-diff-check:
    cwd: .
    command: git diff --check
    when_to_run: Run before committing to check whitespace errors.
    side_effects: Read-only.
