topics:
  server-rust-comments:
    description: Repository-wide English code comment rules plus server Rust rustdoc requirements and critical inline comment expectations.
    read:
      - .agent/AGENTS.md
      - .agent/manifest.yaml
  backend-architecture:
    description: Server entrypoints, routes, services, domain models, database repositories, and migrations.
    read:
      - services/api/src/lib.rs
      - services/api/src/routes/mod.rs
      - services/api/src/services/auth_service.rs
      - services/api/src/services/gear_service.rs
      - crates/domain/src/gear.rs
      - crates/db/src/repositories/auth_repository.rs
      - crates/db/src/repositories/gear_repository.rs
      - crates/migration/src/lib.rs

tasks:
  backend-code-change:
    description: Load the comment rules and run Rust verification commands when changing server Rust code.
    read:
      - .agent/AGENTS.md
      - .agent/manifest.yaml
      - .agent/commands.yaml
  agent-rule-update:
    description: Validate YAML and relative path references after updating .agent rules.
    read:
      - .agent/AGENTS.md
      - .agent/manifest.yaml
      - .agent/context-index.yaml
      - .agent/commands.yaml
