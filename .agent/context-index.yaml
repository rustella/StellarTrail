topics:
  server-rust-comments:
    description: 服务端 Rust 注释规则、rustdoc 规范和关键逻辑行内注释要求。
    read:
      - .agent/AGENTS.md
      - .agent/manifest.yaml
  backend-architecture:
    description: 服务端入口、路由、服务、领域、数据库和迁移代码。
    read:
      - services/api/src/lib.rs
      - services/api/src/routes/mod.rs
      - services/api/src/services/auth_service.rs
      - services/api/src/services/gear_service.rs
      - crates/domain/src/gear.rs
      - crates/db/src/repositories/auth_repository.rs
      - crates/db/src/repositories/gear_repository.rs
      - crates/migration/src/lib.rs

tasks:
  backend-code-change:
    description: 修改服务端 Rust 代码时加载注释规则并运行 Rust 验证命令。
    read:
      - .agent/AGENTS.md
      - .agent/manifest.yaml
      - .agent/commands.yaml
  agent-rule-update:
    description: 更新 .agent 规则时验证 YAML 与相对路径引用。
    read:
      - .agent/AGENTS.md
      - .agent/manifest.yaml
      - .agent/context-index.yaml
      - .agent/commands.yaml
