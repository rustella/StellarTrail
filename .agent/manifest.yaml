project:
  name: StellarTrail
  repository: https://github.com/rustella/StellarTrail
  description: Outdoor gear management Mini Program and backend, also known as Xunjing Xingye.

stack:
  backend:
    language: Rust
    framework: axum
    source_roots:
      - services/api/src
      - crates/domain/src
      - crates/db/src
      - crates/importer/src
      - crates/migration/src
  frontend:
    source_roots:
      - apps/web
      - apps/wechat-miniprogram

entrypoints:
  api:
    main: services/api/src/main.rs
    library: services/api/src/lib.rs
    routes: services/api/src/routes/mod.rs
  migrations: crates/migration/src/lib.rs

policies:
  code_comments:
    language: en-US
    scope: All code comments across the repository must be written in English.
  server_rust_comments:
    language: en-US
    module_docs: Use `//!` to describe each server Rust crate or module responsibility, boundary, and key constraint.
    item_docs: Use `///` for `pub` types, `pub` functions, and important private functions to describe purpose, inputs/outputs, errors, or safety boundaries.
    inline_comments: Use `//` for critical authentication, database, cache, state transition, external call, import/export, and migration DDL logic.
  secrets:
    rule: Do not write tokens, passwords, connection strings, or other secrets in code, comments, logs, or documentation.
  docs_sync:
    rule: Keep README, docs/api.md, or .agent rules synchronized when APIs, configuration, migrations, or run commands change.

validation:
  backend:
    - cargo fmt --all -- --check
    - cargo check --workspace
    - cargo test --workspace
    - cargo clippy --workspace --all-targets -- -D warnings
    - cargo doc --workspace --no-deps
  workspace:
    - npm run check
    - npm run format:check
    - git diff --check

freshness:
  last_updated: 2026-05-16
  source: Current repository code and explicit user requirements.
