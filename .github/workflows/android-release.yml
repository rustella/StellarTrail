name: Android Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "apps/android/**"
      - "gradle/**"
      - "gradle.properties"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradlew"
      - "gradlew.bat"
      - "scripts/ci/detect-android-release-tags.sh"
      - "scripts/ci/prepare-android-release-assets.sh"
      - "scripts/ci/write-android-release-notes.sh"
      - ".github/workflows/android-release.yml"
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional existing tag to release manually, for recovery"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  main-release-android:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-36 build-tools;36.0.0"
      - uses: gradle/actions/setup-gradle@v4
      - run: chmod +x ./gradlew scripts/ci/*.sh
      - name: Prepare Android release configuration
        env:
          STELLARTRAIL_API_BASE_URL: ${{ secrets.STELLARTRAIL_API_BASE_URL }}
          STELLARTRAIL_ASSETS_BASE_URL: ${{ secrets.STELLARTRAIL_ASSETS_BASE_URL }}
          STELLARTRAIL_DOMAIN_CANDIDATES: ${{ secrets.STELLARTRAIL_DOMAIN_CANDIDATES }}
          STELLARTRAIL_ANDROID_REQUEST_SIGNATURE_APP_ID: ${{ secrets.STELLARTRAIL_ANDROID_REQUEST_SIGNATURE_APP_ID }}
          STELLARTRAIL_ANDROID_REQUEST_SIGNATURE_APP_SECRET: ${{ secrets.STELLARTRAIL_ANDROID_REQUEST_SIGNATURE_APP_SECRET }}
        run: |
          set -euo pipefail

          : "${STELLARTRAIL_API_BASE_URL:?Missing STELLARTRAIL_API_BASE_URL secret}"
          : "${STELLARTRAIL_ASSETS_BASE_URL:?Missing STELLARTRAIL_ASSETS_BASE_URL secret}"
          : "${STELLARTRAIL_ANDROID_REQUEST_SIGNATURE_APP_ID:?Missing STELLARTRAIL_ANDROID_REQUEST_SIGNATURE_APP_ID secret}"
          : "${STELLARTRAIL_ANDROID_REQUEST_SIGNATURE_APP_SECRET:?Missing STELLARTRAIL_ANDROID_REQUEST_SIGNATURE_APP_SECRET secret}"

          {
            printf 'stellartrail.apiBaseUrl=%s\n' "${STELLARTRAIL_API_BASE_URL}"
            printf 'stellartrail.assetsBaseUrl=%s\n' "${STELLARTRAIL_ASSETS_BASE_URL}"
            printf 'stellartrail.domainCandidates=%s\n' "${STELLARTRAIL_DOMAIN_CANDIDATES:-}"
            printf 'app_id=%s\n' "${STELLARTRAIL_ANDROID_REQUEST_SIGNATURE_APP_ID}"
            printf 'app_secret=%s\n' "${STELLARTRAIL_ANDROID_REQUEST_SIGNATURE_APP_SECRET}"
          } > apps/android/config.properties
      - name: Prepare Android release signing
        env:
          STELLARTRAIL_ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.STELLARTRAIL_ANDROID_RELEASE_KEYSTORE_BASE64 }}
          STELLARTRAIL_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.STELLARTRAIL_ANDROID_KEYSTORE_PASSWORD }}
          STELLARTRAIL_ANDROID_KEY_ALIAS: ${{ secrets.STELLARTRAIL_ANDROID_KEY_ALIAS }}
          STELLARTRAIL_ANDROID_KEY_PASSWORD: ${{ secrets.STELLARTRAIL_ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          : "${STELLARTRAIL_ANDROID_RELEASE_KEYSTORE_BASE64:?Missing STELLARTRAIL_ANDROID_RELEASE_KEYSTORE_BASE64 secret}"
          : "${STELLARTRAIL_ANDROID_KEYSTORE_PASSWORD:?Missing STELLARTRAIL_ANDROID_KEYSTORE_PASSWORD secret}"
          : "${STELLARTRAIL_ANDROID_KEY_ALIAS:?Missing STELLARTRAIL_ANDROID_KEY_ALIAS secret}"
          : "${STELLARTRAIL_ANDROID_KEY_PASSWORD:?Missing STELLARTRAIL_ANDROID_KEY_PASSWORD secret}"

          echo "::add-mask::${STELLARTRAIL_ANDROID_KEYSTORE_PASSWORD}"
          echo "::add-mask::${STELLARTRAIL_ANDROID_KEY_ALIAS}"
          echo "::add-mask::${STELLARTRAIL_ANDROID_KEY_PASSWORD}"

          keystore_path="${RUNNER_TEMP}/stellartrail-android-release.jks"
          printf '%s' "${STELLARTRAIL_ANDROID_RELEASE_KEYSTORE_BASE64}" | base64 -d > "${keystore_path}"
          chmod 600 "${keystore_path}"

          {
            printf 'STELLARTRAIL_ANDROID_KEYSTORE_PATH=%s\n' "${keystore_path}"
            printf 'STELLARTRAIL_ANDROID_KEYSTORE_PASSWORD=%s\n' "${STELLARTRAIL_ANDROID_KEYSTORE_PASSWORD}"
            printf 'STELLARTRAIL_ANDROID_KEY_ALIAS=%s\n' "${STELLARTRAIL_ANDROID_KEY_ALIAS}"
            printf 'STELLARTRAIL_ANDROID_KEY_PASSWORD=%s\n' "${STELLARTRAIL_ANDROID_KEY_PASSWORD}"
          } >> "${GITHUB_ENV}"
      - run: ./gradlew :apps:android:testDebugUnitTest :apps:android:lintDebug :apps:android:assembleRelease :apps:android:bundleRelease
      - name: Prepare main release artifacts
        run: |
          set -euo pipefail

          short_sha="$(git rev-parse --short=12 HEAD)"
          scripts/ci/prepare-android-release-assets.sh "StellarTrail-main-${short_sha}-android-release"
      - name: Upload signed release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ANDROID_ARTIFACT_NAME }}
          path: |
            release/${{ env.APK_ASSET_NAME }}
            release/${{ env.APK_ASSET_NAME }}.sha256
            release/${{ env.AAB_ASSET_NAME }}
            release/${{ env.AAB_ASSET_NAME }}.sha256
            release/${{ env.NATIVE_SYMBOLS_ASSET_NAME }}
            release/${{ env.NATIVE_SYMBOLS_ASSET_NAME }}.sha256
          if-no-files-found: error
          retention-days: 30

  detect:
    runs-on: ubuntu-latest
    outputs:
      has_tags: ${{ steps.detect.outputs.has_tags }}
      tags_json: ${{ steps.detect.outputs.tags_json }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - run: chmod +x scripts/ci/*.sh
      - id: detect
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_TAG: ${{ github.event.inputs.tag || '' }}
          GITHUB_EVENT_BEFORE: ${{ github.event.before || '' }}
        run: scripts/ci/detect-android-release-tags.sh

  release:
    needs: detect
    if: needs.detect.outputs.has_tags == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: android-release-${{ matrix.tag }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix:
        tag: ${{ fromJson(needs.detect.outputs.tags_json) }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ matrix.tag }}
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-36 build-tools;36.0.0"
      - uses: gradle/actions/setup-gradle@v4
      - run: chmod +x ./gradlew scripts/ci/*.sh
      - name: Prepare Android release configuration
        env:
          STELLARTRAIL_API_BASE_URL: ${{ secrets.STELLARTRAIL_API_BASE_URL }}
          STELLARTRAIL_ASSETS_BASE_URL: ${{ secrets.STELLARTRAIL_ASSETS_BASE_URL }}
          STELLARTRAIL_DOMAIN_CANDIDATES: ${{ secrets.STELLARTRAIL_DOMAIN_CANDIDATES }}
          STELLARTRAIL_ANDROID_REQUEST_SIGNATURE_APP_ID: ${{ secrets.STELLARTRAIL_ANDROID_REQUEST_SIGNATURE_APP_ID }}
          STELLARTRAIL_ANDROID_REQUEST_SIGNATURE_APP_SECRET: ${{ secrets.STELLARTRAIL_ANDROID_REQUEST_SIGNATURE_APP_SECRET }}
        run: |
          set -euo pipefail

          : "${STELLARTRAIL_API_BASE_URL:?Missing STELLARTRAIL_API_BASE_URL secret}"
          : "${STELLARTRAIL_ASSETS_BASE_URL:?Missing STELLARTRAIL_ASSETS_BASE_URL secret}"
          : "${STELLARTRAIL_ANDROID_REQUEST_SIGNATURE_APP_ID:?Missing STELLARTRAIL_ANDROID_REQUEST_SIGNATURE_APP_ID secret}"
          : "${STELLARTRAIL_ANDROID_REQUEST_SIGNATURE_APP_SECRET:?Missing STELLARTRAIL_ANDROID_REQUEST_SIGNATURE_APP_SECRET secret}"

          {
            printf 'stellartrail.apiBaseUrl=%s\n' "${STELLARTRAIL_API_BASE_URL}"
            printf 'stellartrail.assetsBaseUrl=%s\n' "${STELLARTRAIL_ASSETS_BASE_URL}"
            printf 'stellartrail.domainCandidates=%s\n' "${STELLARTRAIL_DOMAIN_CANDIDATES:-}"
            printf 'app_id=%s\n' "${STELLARTRAIL_ANDROID_REQUEST_SIGNATURE_APP_ID}"
            printf 'app_secret=%s\n' "${STELLARTRAIL_ANDROID_REQUEST_SIGNATURE_APP_SECRET}"
          } > apps/android/config.properties
      - name: Prepare Android release signing
        env:
          STELLARTRAIL_ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.STELLARTRAIL_ANDROID_RELEASE_KEYSTORE_BASE64 }}
          STELLARTRAIL_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.STELLARTRAIL_ANDROID_KEYSTORE_PASSWORD }}
          STELLARTRAIL_ANDROID_KEY_ALIAS: ${{ secrets.STELLARTRAIL_ANDROID_KEY_ALIAS }}
          STELLARTRAIL_ANDROID_KEY_PASSWORD: ${{ secrets.STELLARTRAIL_ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          : "${STELLARTRAIL_ANDROID_RELEASE_KEYSTORE_BASE64:?Missing STELLARTRAIL_ANDROID_RELEASE_KEYSTORE_BASE64 secret}"
          : "${STELLARTRAIL_ANDROID_KEYSTORE_PASSWORD:?Missing STELLARTRAIL_ANDROID_KEYSTORE_PASSWORD secret}"
          : "${STELLARTRAIL_ANDROID_KEY_ALIAS:?Missing STELLARTRAIL_ANDROID_KEY_ALIAS secret}"
          : "${STELLARTRAIL_ANDROID_KEY_PASSWORD:?Missing STELLARTRAIL_ANDROID_KEY_PASSWORD secret}"

          echo "::add-mask::${STELLARTRAIL_ANDROID_KEYSTORE_PASSWORD}"
          echo "::add-mask::${STELLARTRAIL_ANDROID_KEY_ALIAS}"
          echo "::add-mask::${STELLARTRAIL_ANDROID_KEY_PASSWORD}"

          keystore_path="${RUNNER_TEMP}/stellartrail-android-release.jks"
          printf '%s' "${STELLARTRAIL_ANDROID_RELEASE_KEYSTORE_BASE64}" | base64 -d > "${keystore_path}"
          chmod 600 "${keystore_path}"

          {
            printf 'STELLARTRAIL_ANDROID_KEYSTORE_PATH=%s\n' "${keystore_path}"
            printf 'STELLARTRAIL_ANDROID_KEYSTORE_PASSWORD=%s\n' "${STELLARTRAIL_ANDROID_KEYSTORE_PASSWORD}"
            printf 'STELLARTRAIL_ANDROID_KEY_ALIAS=%s\n' "${STELLARTRAIL_ANDROID_KEY_ALIAS}"
            printf 'STELLARTRAIL_ANDROID_KEY_PASSWORD=%s\n' "${STELLARTRAIL_ANDROID_KEY_PASSWORD}"
          } >> "${GITHUB_ENV}"
      - run: ./gradlew :apps:android:testDebugUnitTest :apps:android:lintDebug :apps:android:assembleRelease :apps:android:bundleRelease
      - name: Prepare release assets
        env:
          TAG: ${{ matrix.tag }}
        run: |
          set -euo pipefail

          test "$(git rev-parse HEAD)" = "$(git rev-parse "${TAG}^{commit}")"
          scripts/ci/prepare-android-release-assets.sh "StellarTrail-${TAG}-android-release"
      - name: Write release notes
        env:
          RELEASE_TAG: ${{ matrix.tag }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: scripts/ci/write-android-release-notes.sh
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ matrix.tag }}
        run: |
          set -euo pipefail

          apk_name="StellarTrail-${TAG}-android-release.apk"
          aab_name="StellarTrail-${TAG}-android-release.aab"
          native_symbols_name="StellarTrail-${TAG}-android-release-native-debug-symbols.zip"
          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "GitHub Release ${TAG} already exists; skipping creation."
            exit 0
          fi

          gh release create "${TAG}" \
            "release/${apk_name}#${apk_name}" \
            "release/${apk_name}.sha256#${apk_name}.sha256" \
            "release/${aab_name}#${aab_name}" \
            "release/${aab_name}.sha256#${aab_name}.sha256" \
            "release/${native_symbols_name}#${native_symbols_name}" \
            "release/${native_symbols_name}.sha256#${native_symbols_name}.sha256" \
            --verify-tag \
            --title "StellarTrail Android ${TAG}" \
            --notes-file "release/release-notes-${TAG}.md"
