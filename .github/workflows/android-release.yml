name: Android Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional existing tag to release manually, for recovery"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      has_tags: ${{ steps.detect.outputs.has_tags }}
      tags_json: ${{ steps.detect.outputs.tags_json }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - run: chmod +x scripts/ci/*.sh
      - id: detect
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_TAG: ${{ github.event.inputs.tag || '' }}
          GITHUB_EVENT_BEFORE: ${{ github.event.before || '' }}
        run: scripts/ci/detect-android-release-tags.sh

  release:
    needs: detect
    if: needs.detect.outputs.has_tags == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: android-release-${{ matrix.tag }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix:
        tag: ${{ fromJson(needs.detect.outputs.tags_json) }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ matrix.tag }}
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: android-actions/setup-android@v3
      - run: sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"
      - uses: gradle/actions/setup-gradle@v4
      - run: chmod +x ./gradlew scripts/ci/*.sh
      - run: ./gradlew :apps:android:testDebugUnitTest :apps:android:lintDebug :apps:android:assembleDebug
      - name: Prepare release asset
        env:
          TAG: ${{ matrix.tag }}
        run: |
          set -euo pipefail

          test "$(git rev-parse HEAD)" = "$(git rev-parse "${TAG}^{commit}")"

          mkdir -p release
          mapfile -t apk_files < <(find apps/android/build/outputs/apk/debug -maxdepth 1 -type f -name '*.apk' | sort)

          if ((${#apk_files[@]} == 0)); then
            echo "No debug APK found under apps/android/build/outputs/apk/debug" >&2
            exit 1
          fi

          if ((${#apk_files[@]} > 1)); then
            printf 'Multiple debug APK files found; refusing to guess:\n' >&2
            printf '  %s\n' "${apk_files[@]}" >&2
            exit 1
          fi

          apk_src="${apk_files[0]}"
          apk_name="StellarTrail-${TAG}-android-debug.apk"
          cp "$apk_src" "release/$apk_name"

          (
            cd release
            sha256sum "$apk_name" > "$apk_name.sha256"
          )
          read -r apk_sha256 _ < "release/$apk_name.sha256"

          {
            echo "APK_ASSET_NAME=$apk_name"
            echo "APK_SHA256=$apk_sha256"
          } >> "$GITHUB_ENV"
      - name: Write release notes
        env:
          RELEASE_TAG: ${{ matrix.tag }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: scripts/ci/write-android-release-notes.sh
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ matrix.tag }}
        run: |
          set -euo pipefail

          apk_name="StellarTrail-${TAG}-android-debug.apk"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "GitHub Release ${TAG} already exists; skipping creation."
            exit 0
          fi

          gh release create "$TAG" \
            "release/$apk_name#$apk_name" \
            "release/$apk_name.sha256#$apk_name.sha256" \
            --verify-tag \
            --title "StellarTrail Android $TAG" \
            --notes-file "release/release-notes-$TAG.md"
