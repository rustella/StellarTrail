name: Frontend CI

on:
  push:
    paths:
      - "apps/**"
      - "packages/**"
      - "package.json"
      - "tsconfig.base.json"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    paths:
      - "apps/**"
      - "packages/**"
      - "package.json"
      - "tsconfig.base.json"
      - ".github/workflows/frontend-ci.yml"

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run check
