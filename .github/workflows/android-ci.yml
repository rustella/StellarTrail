name: Android CI

on:
  push:
    paths:
      - "apps/android/**"
      - "gradle/**"
      - "gradle.properties"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradlew"
      - "gradlew.bat"
      - ".github/workflows/android-ci.yml"
  pull_request:
    paths:
      - "apps/android/**"
      - "gradle/**"
      - "gradle.properties"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradlew"
      - "gradlew.bat"
      - ".github/workflows/android-ci.yml"

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-36 build-tools;36.0.0"
      - uses: gradle/actions/setup-gradle@v4
      - run: chmod +x ./gradlew
      - run: ./gradlew :apps:android:testDebugUnitTest :apps:android:lintDebug :apps:android:assembleDebug
