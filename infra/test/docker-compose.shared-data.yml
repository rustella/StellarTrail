services:
  postgres:
    volumes:
      - ${STELLARTRAIL_TEST_DATA_ROOT:?set STELLARTRAIL_TEST_DATA_ROOT}/postgres:/var/lib/postgresql/data

  redis:
    volumes:
      - ${STELLARTRAIL_TEST_DATA_ROOT:?set STELLARTRAIL_TEST_DATA_ROOT}/redis:/data

  minio:
    volumes:
      - ${STELLARTRAIL_TEST_DATA_ROOT:?set STELLARTRAIL_TEST_DATA_ROOT}/minio:/data
