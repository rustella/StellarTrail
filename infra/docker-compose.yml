services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: stellartrail
      POSTGRES_PASSWORD: stellartrail
      POSTGRES_DB: stellartrail
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: stellartrail
      MYSQL_DATABASE: stellartrail
      MYSQL_USER: stellartrail
      MYSQL_PASSWORD: stellartrail
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  postgres-data:
  redis-data:
  mysql-data:
