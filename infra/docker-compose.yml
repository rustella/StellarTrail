services:
  postgres:
    image: postgres:16-alpine
    network_mode: bridge
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-stellartrail}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stellartrail}
      POSTGRES_DB: ${POSTGRES_DB:-stellartrail}
    ports:
      - "${POSTGRES_HOST_PORT:-15432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER:-stellartrail} -d $${POSTGRES_DB:-stellartrail}",
        ]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    network_mode: bridge
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_HOST_PORT:-16379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    network_mode: bridge
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: local
      APP_HOST: 0.0.0.0
      APP_PORT: 8080
      RUST_LOG: stellartrail_api=debug,tower_http=debug,info
      CONTENT_DIR: /app/content
      DATABASE_URL: postgres://${POSTGRES_USER:-stellartrail}:${POSTGRES_PASSWORD:-stellartrail}@host.docker.internal:${POSTGRES_HOST_PORT:-15432}/${POSTGRES_DB:-stellartrail}
      REDIS_URL: redis://host.docker.internal:${REDIS_HOST_PORT:-16379}/0
      REDIS_KEY_PREFIX: stellartrail-compose
      REDIS_GEAR_CACHE_TTL_SECONDS: 30
      WECHAT_MOCK_LOGIN: "true"
      WECHAT_APP_ID: ""
      WECHAT_APP_SECRET: ""
    ports:
      - "${API_HOST_PORT:-18080}:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/healthz"]
      interval: 5s
      timeout: 5s
      retries: 24

  mysql:
    profiles: ["mysql"]
    image: mysql:8.4
    network_mode: bridge
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-stellartrail}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-stellartrail}
      MYSQL_USER: ${MYSQL_USER:-stellartrail}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-stellartrail}
    ports:
      - "${MYSQL_HOST_PORT:-13306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  postgres-data:
  redis-data:
  mysql-data:
