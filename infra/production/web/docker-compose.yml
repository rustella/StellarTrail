services:
  web:
    build:
      context: ../../..
      dockerfile: infra/production/web/Dockerfile
      args:
        VITE_STELLARTRAIL_API_BASE_URL: ${VITE_STELLARTRAIL_API_BASE_URL:?set VITE_STELLARTRAIL_API_BASE_URL in the env file}
        VITE_STELLARTRAIL_REQUEST_SIGNATURE_APP_ID: ${VITE_STELLARTRAIL_REQUEST_SIGNATURE_APP_ID:-}
        VITE_STELLARTRAIL_REQUEST_SIGNATURE_APP_SECRET: ${VITE_STELLARTRAIL_REQUEST_SIGNATURE_APP_SECRET:-}
    image: ${STELLARTAIL_WEB_IMAGE:-ghcr.io/rustella/stellartrail-web:latest}
    restart: unless-stopped
    networks:
      - edge
    labels:
      traefik.enable: "true"
      traefik.docker.network: ${STELLARTAIL_EDGE_NETWORK:-stellartail-edge}
      traefik.http.routers.web.rule: "${TRAEFIK_WEB_RULE:-Host(`app.example.invalid`) || Host(`app-alt1.example.invalid`) || Host(`app-alt2.example.invalid`)}"
      traefik.http.routers.web.entrypoints: websecure
      traefik.http.routers.web.tls.certresolver: ${TRAEFIK_CERT_RESOLVER:-letsencrypt}
      traefik.http.routers.web.middlewares: security-headers@file
      traefik.http.services.web.loadbalancer.server.port: "80"

networks:
  edge:
    name: ${STELLARTAIL_EDGE_NETWORK:-stellartail-edge}
    external: true
