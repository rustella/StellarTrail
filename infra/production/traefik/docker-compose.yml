services:
  traefik:
    image: ${TRAEFIK_IMAGE:-traefik:v3.1}
    restart: unless-stopped
    command:
      - --configFile=/etc/traefik/traefik.yml
      - --certificatesResolvers.letsencrypt.acme.email=${TRAEFIK_ACME_EMAIL:?set TRAEFIK_ACME_EMAIL in infra/production/traefik/.env}
    ports:
      - "80:80"
      - "443:443"
    environment:
      TRAEFIK_ACME_EMAIL: ${TRAEFIK_ACME_EMAIL:?set TRAEFIK_ACME_EMAIL in infra/production/traefik/.env}
    volumes:
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - ./dynamic:/etc/traefik/dynamic:ro
      - ${STELLARTAIL_DEPLOY_ROOT:-/www/service/stellartail}/traefik/acme.json:/acme/acme.json
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - edge
    labels:
      traefik.enable: "false"

networks:
  edge:
    name: ${STELLARTAIL_EDGE_NETWORK:-stellartail-edge}
    external: true
