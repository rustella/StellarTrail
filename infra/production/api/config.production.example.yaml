# Production example for the API root config.yaml file.
# Keep the real /www/service/stellartail/config.yaml out of Git.
# Run infra/production/api/compose-from-config.sh instead of keeping an
# infra/production/api/.env file; the wrapper derives Docker Compose secrets
# for PostgreSQL, Redis, and MinIO from this same config.yaml.
app:
  env: production
  host: 0.0.0.0
  port: 8080

database:
  url: postgresql://stellartrail:example-password@postgres:5432/stellartrail

wechat:
  mock_login: false
  app_id: example-wechat-app-id
  app_secret: example-wechat-app-secret

redis:
  url: redis://redis:6379/0
  key_prefix: stellartrail:prod
  gear_cache_ttl_seconds: 60

upload:
  max_image_bytes: 8000000
  rate_limit_window_seconds: 3600
  max_images_per_window: 30
  max_total_images_per_user: 100
  max_total_bytes_per_user: 200000000

minio:
  endpoint: http://minio:9000
  region: us-east-1
  access_key_id: example-access-key
  secret_access_key: example-secret-key
  force_path_style: true

object_storage:
  bucket: stellartrail-uploads

avatar_storage:
  bucket: stellartrail-avatars
  public_base_url: https://assets.example.invalid/stellartrail-avatars
  max_image_bytes: 2000000

knots_media_storage:
  storage_profile: knots-public
  bucket: stellartrail-knots-media
  public_base_url: https://assets.example.invalid/stellartrail-knots-media
  max_image_bytes: 32000000
  max_video_bytes: 80000000
rate_limit:
  enabled: true
  window_seconds: 60
  max_requests_per_ip: 120
  max_requests_per_user: 240
  trust_proxy_headers: true
  trusted_proxy_cidrs:
    - 172.16.0.0/12

public_api:
  rate_limit_enabled: true
  rate_limit_window_seconds: 60
  rate_limit_max_requests_per_ip: 120
  cache_ttl_seconds: 300
  cache_stale_seconds: 600
  max_list_limit: 100
  max_search_query_chars: 64
  max_offset: 10000
  trust_proxy_headers: true
  trusted_proxy_cidrs:
    - 172.16.0.0/12

cors:
  allowed_origins:
    - https://app.example.invalid
    - https://app-alt1.example.invalid
    - https://app-alt2.example.invalid
    - https://site.example.invalid
    - https://site-alt1.example.invalid
    - https://site-alt2.example.invalid
    - https://www.example.invalid
  allow_credentials: true
