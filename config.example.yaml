# StellarTrail API configuration example.
#
# Copy this file to config.yaml for a local single-file setup, or set
# CONFIG_PATH=/path/to/config.yaml. Most runtime values can still be
# overridden by environment variables, but SMS credentials are intentionally
# file-only and should live in an ignored config.yaml or a secret manager that
# renders that file.

app:
  env: local
  host: 127.0.0.1
  port: 8080
  # Optional Git commit hash for admin-created client version records.
  commit_hash: null

database:
  # Supported prefixes: sqlite://, postgres://, postgresql://.
  url: sqlite://stellartrail.db

wechat:
  mock_login: true
  app_id: null
  app_secret: null

redis:
  # Leave null/empty to disable Redis-backed read-through cache.
  url: null
  key_prefix: stellartrail
  gear_cache_ttl_seconds: 30

upload:
  max_image_bytes: 8000000
  rate_limit_window_seconds: 3600
  max_images_per_window: 30
  max_total_images_per_user: 100
  max_total_bytes_per_user: 200000000

trail:
  upload_max_bytes: 25000000
  upload_max_points: 50000
  max_simplified_points: 2000
  max_trails_per_trip: 20
  max_annotations_per_context: 500
  overview_max_trips: 100
  overview_max_trails: 200
  overview_max_points: 5000
  overview_max_points_per_trail: 160

map:
  provider: maptiler
  # The public key is returned to clients and should be constrained by MapTiler
  # allowed origins, quota monitoring, and rotation. Do not put service tokens here.
  style_url: https://api.maptiler.com/maps/outdoor-v2/style.json
  default_style_id: outdoor
  styles:
    - id: outdoor
      label: 户外
      style_url: https://api.maptiler.com/maps/outdoor-v2/style.json
    - id: streets
      label: 街道
      style_url: https://api.maptiler.com/maps/streets-v2/style.json
    - id: satellite
      label: 卫星
      style_url: https://api.maptiler.com/maps/satellite/style.json
  public_key: null

# Shared MinIO/S3-compatible connection used by private feedback uploads and
# public Knots3D media buckets. Trail source files use the private upload bucket.
minio:
  endpoint: http://127.0.0.1:19000
  region: us-east-1
  access_key_id: null
  secret_access_key: null
  force_path_style: true

# Private image uploads for feedback.
object_storage:
  bucket: stellartrail-uploads

# Public user avatar images. These are returned in auth/profile responses.
avatar_storage:
  bucket: stellartrail-avatars
  public_base_url: http://127.0.0.1:19000/stellartrail-avatars
  max_image_bytes: 2000000

# Public Knots3D media objects. Public URLs are stored in DB media_resources.
knots_media_storage:
  storage_profile: knots-public
  bucket: stellartrail-knots-media
  public_base_url: http://127.0.0.1:19000/stellartrail-knots-media
  max_image_bytes: 32000000
  max_video_bytes: 80000000

rate_limit:
  enabled: true
  window_seconds: 60
  max_requests_per_ip: 120
  max_requests_per_user: 240
  trust_proxy_headers: false
  trusted_proxy_cidrs: []

request_signature:
  # Keep real app_id/app_secret pairs only in ignored config.yaml or config.*.yaml files.
  enabled: false
  nonce_ttl_seconds: 300
  clients:
    - app_id: example-client-id
      app_secret: example-client-secret

mail:
  enabled: false
  smtp_host: smtp.example.invalid
  smtp_port: 465
  smtp_tls: implicit
  smtp_username: "[REDACTED]"
  # Keep real SMTP passwords in config.yaml, .env, or a secret manager.
  smtp_password: null
  from: "StellarTrail <[REDACTED]>"
  verification_subject: 寻径星野邮箱验证码

sms:
  enabled: false
  endpoint: dypnsapi.aliyuncs.com
  access_key_id: "[REDACTED]"
  # Keep real SMS credentials in ignored config.yaml, not in environment variables.
  access_key_secret: null
  sign_name: example-sms-sign-name
  scheme_name: null
  valid_time_seconds: 300
  interval_seconds: 60
  login_register_template_code: "100001"
  change_bound_phone_template_code: "100002"
  password_reset_template_code: "100003"
  bind_new_phone_template_code: "100004"
  verify_bound_phone_template_code: "100005"
  phone_rate_limit:
    enabled: true
    cooldown_seconds: 60
    window_seconds: 86400
    max_sends_per_window: 20

public_api:
  rate_limit_enabled: true
  rate_limit_window_seconds: 60
  rate_limit_max_requests_per_ip: 120
  cache_ttl_seconds: 300
  cache_stale_seconds: 600
  max_list_limit: 100
  max_search_query_chars: 64
  max_offset: 10000
  trust_proxy_headers: false
  trusted_proxy_cidrs: []

cors:
  allowed_origins:
    - https://app.example.invalid
    - https://site.example.invalid
    - https://www.example.invalid
  allow_credentials: true
