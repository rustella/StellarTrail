# StellarTrail API configuration example.
#
# Copy this file to config.yaml for a local single-file setup, or set
# CONFIG_PATH=/path/to/config.yaml. Environment variables still have priority
# over values in this file so deployments can inject secrets safely.

app:
  env: local
  host: 127.0.0.1
  port: 8080
  # Optional Git commit hash for admin-created client version records.
  commit_hash: null

database:
  # Supported prefixes: sqlite://, postgres://, postgresql://.
  url: sqlite://stellartrail.db

wechat:
  mock_login: true
  app_id: null
  app_secret: null

redis:
  # Leave null/empty to disable Redis-backed read-through cache.
  url: null
  key_prefix: stellartrail
  gear_cache_ttl_seconds: 30

upload:
  max_image_bytes: 8000000
  rate_limit_window_seconds: 3600
  max_images_per_window: 30
  max_total_images_per_user: 100
  max_total_bytes_per_user: 200000000

# Shared MinIO/S3-compatible connection used by private feedback uploads and
# public Knots3D media buckets.
minio:
  endpoint: http://127.0.0.1:19000
  region: us-east-1
  access_key_id: null
  secret_access_key: null
  force_path_style: true

# Private image uploads for feedback.
object_storage:
  bucket: stellartrail-uploads

# Public user avatar images. These are returned in auth/profile responses.
avatar_storage:
  bucket: stellartrail-avatars
  public_base_url: http://127.0.0.1:19000/stellartrail-avatars
  max_image_bytes: 2000000

# Public Knots3D media objects. Public URLs are stored in DB media_resources.
knots_media_storage:
  storage_profile: knots-public
  bucket: stellartrail-knots-media
  public_base_url: http://127.0.0.1:19000/stellartrail-knots-media
  max_image_bytes: 32000000
  max_video_bytes: 80000000

rate_limit:
  enabled: true
  window_seconds: 60
  max_requests_per_ip: 120
  max_requests_per_user: 240
  trust_proxy_headers: false
  trusted_proxy_cidrs: []

mail:
  enabled: false
  smtp_host: smtp.example.invalid
  smtp_port: 465
  smtp_tls: implicit
  smtp_username: "[REDACTED]"
  # Keep real SMTP passwords in config.yaml, .env, or a secret manager.
  smtp_password: null
  from: "StellarTrail <[REDACTED]>"
  verification_subject: 寻径星野邮箱验证码

public_api:
  rate_limit_enabled: true
  rate_limit_window_seconds: 60
  rate_limit_max_requests_per_ip: 120
  cache_ttl_seconds: 300
  cache_stale_seconds: 600
  max_list_limit: 100
  max_search_query_chars: 64
  max_offset: 10000
  trust_proxy_headers: false
  trusted_proxy_cidrs: []

cors:
  allowed_origins:
    - https://app.example.invalid
    - https://site.example.invalid
    - https://www.example.invalid
  allow_credentials: true
